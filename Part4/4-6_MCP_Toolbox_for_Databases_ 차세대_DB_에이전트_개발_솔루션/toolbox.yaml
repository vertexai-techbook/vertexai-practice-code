sources:
  mhkim-bigquery-source:
    kind: bigquery
    project: vertxai-books # Google Cloud 프로젝트 ID로 대체
    location: asia-northeast3 # 쿼리 작업 위치 (선택 사항)
tools:
  # 도구 1: 특정 도시의 고객 목록 조회
  get_customers_by_city:
    kind: bigquery-sql
    source: mhkim-ecommerce-source
    description: 지정된 도시(city)에 거주하는 고객의 이름과 가입일 목록을 조회합니다.
    parameters:
      - name: city
        type: string
        description: 조회할 도시 이름 (ex) 서울, 부산, 대전)
    statement: |
      SELECT customer_name, signup_date
      FROM `YOUR_PROJECT_ID.ecommerce_ds.customers`
      WHERE city = @city;

  # 도구 2: 특정 카테고리별 총 판매 수량 및 매출 조회
  get_sales_by_category:
    kind: bigquery-sql
    source: mhkim-ecommerce-source
    description: 지정된 카테고리(category)의 총 판매 수량과 총 매출을 계산합니다.
    parameters:
      - name: category
        type: string
        description: 조회할 상품 카테고리 (ex) 전자제품, 의류, 식품)
    statement: |
      SELECT 
          t1.category, 
          SUM(t2.quantity) AS total_quantity, 
          SUM(t2.quantity * t1.price) AS total_revenue
      FROM `YOUR_PROJECT_ID.ecommerce_ds.products` AS t1
      JOIN `YOUR_PROJECT_ID.ecommerce_ds.orders` AS t2 ON t1.product_id = t2.product_id
      WHERE t1.category = @category
      GROUP BY 1;

  # 도구 3: 특정 기간 동안의 일별 총 주문 건수 조회
  get_daily_order_count:
    kind: bigquery-sql
    source: mhkim-ecommerce-source
    description: 지정된 시작일(start_date)과 종료일(end_date) 사이의 일별 총 주문 건수를 조회합니다.
    parameters:
      - name: start_date
        type: string
        description: 조회 시작 날짜 (YYYY-MM-DD 형식)
      - name: end_date
        type: string
        description: 조회 종료 날짜 (YYYY-MM-DD 형식)
    statement: |
      SELECT 
          order_date, 
          COUNT(order_id) AS daily_orders
      FROM `YOUR_PROJECT_ID.ecommerce_ds.orders`
      WHERE order_date BETWEEN PARSE_DATE('%Y-%m-%d', @start_date) AND PARSE_DATE('%Y-%m-%d', @end_date)
      GROUP BY 1
      ORDER BY 1;

  # 도구 4: VIP 고객(총 구매 금액 기준) 상위 N명 조회
  get_top_customers:
    kind: bigquery-sql
    source: mhkim-ecommerce-source
    description: 총 구매 금액 기준으로 상위 N명의 고객 이름과 총 지출 금액을 조회합니다.
    parameters:
      - name: limit_count
        type: integer
        description: 조회할 고객 수 (ex) 10, 20)
    statement: |
      SELECT 
          t3.customer_name, 
          SUM(t1.quantity * t2.price) AS total_spent
      FROM `YOUR_PROJECT_ID.ecommerce_ds.orders` AS t1
      JOIN `YOUR_PROJECT_ID.ecommerce_ds.products` AS t2 ON t1.product_id = t2.product_id
      JOIN `YOUR_PROJECT_ID.ecommerce_ds.customers` AS t3 ON t1.customer_id = t3.customer_id
      GROUP BY 1
      ORDER BY 2 DESC
      LIMIT @limit_count;

toolsets:
  ecommerce_toolset:
    - get_customers_by_city
    - get_sales_by_category
    - get_daily_order_count
    - get_top_customers
